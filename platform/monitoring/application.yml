apiVersion: v1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 45.0.0
    helm:
      valueFiles:
        - platform/monitoring/values.yml
    destination:
      server: 'https://kubernetes.default.svc'
      namespace: monitoring
  syncPolicy:
    automated:
      prune: true 