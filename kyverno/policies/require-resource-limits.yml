apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
spec:
  validationFailureAction: Enforce    # ← block if no limits!
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kube-system   # ← allow no limits in kube-system 
                - kyverno       # ← allow no limits in kyverno namespace (for testing)
                - argocd         # ← allow no limits in argocd namespace (for testing)
      validate:
        message: "Resource limits (CPU and memory) are required for all containers!"
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"         # ← must have cpu limit
                    memory: "?*"      # ← must have memory limit