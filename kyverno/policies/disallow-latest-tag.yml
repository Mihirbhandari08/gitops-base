apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce    # ← block latest tag!
  rules:
    - name: check-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Using 'latest' tag is not allowed! Please use a specific image tag."
        pattern:
          spec:
            containers:
              - image: "!*:latest"   # ← block anything ending in :latest