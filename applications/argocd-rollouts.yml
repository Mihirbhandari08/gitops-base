apiVersion:  argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-rollouts
  namespace: argocd
spec:
  project: default
  source:
    repoURL:  https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.39.0
    helm:
      releaseName: argocd-rollouts
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true