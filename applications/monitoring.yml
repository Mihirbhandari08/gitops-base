apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.1.0
      helm:
        valueFiles:
          - $values/platform/monitoring/values.yml

    - repoURL: https://github.com/Mihirbhandari08/gitops-base.git
      targetRevision: HEAD
      ref: values                  # ← this defines $values!

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true