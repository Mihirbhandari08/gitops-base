apiVersion:  argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy
  namespace: argocd
spec:
  project: default
  source:
    repoURL:  https://aquasecurity.github.io/trivy-operator-chart/
    chart: trivy-operator
    targetRevision: 0.24.1
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true   
      selfHeal: true