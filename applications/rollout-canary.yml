apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rollout-canary
  namespace: argocd
spec:
  project: default
  source:
    repoURL:  https://github.com/Mihirbhandari08/gitops-base.git
    targetRevision: HEAD
    path:  rollout/canary
  destination:
    server: https://kubernetes.default.svc
    namespace: rollout-canary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true    

