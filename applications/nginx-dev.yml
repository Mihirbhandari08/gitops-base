apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Mihirbhandari08/gitops-base.git
      targetRevision: HEAD
      path: nginx
      helm:
        valueFiles:
          - $values/environments/dev/values.yml
    - repoURL: https://github.com/Mihirbhandari08/gitops-base.git
      targetRevision: HEAD
      ref: values 
  
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
