apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Mihirbhandari08/gitops-base.git
    targetRevision: HEAD
    path: nginx
    helm:
      valueFiles:
        - $values/environments/dev/values.yaml
  
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
