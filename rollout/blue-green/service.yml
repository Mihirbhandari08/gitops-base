# Active Service - serves live traffic
apiVersion: v1
kind: Service
metadata:
  name: nginx-active
  namespace: rollout-blue-green
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80

---
# Preview Service - serves new version before promotion
apiVersion: v1
kind: Service
metadata:
  name: nginx-preview
  namespace: rollout-blue-green
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80